<!DOCTYPE html>
<html lang="ms">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Alat Ganti | Login Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style-Login.css">
  <link rel="icon" type="image/png" href="favicon.png">

</head>

<body>

  <!-- Loader Futuristik -->
  <div id="loadingOverlay">
    <span class="loader"></span>
    <div class="loading-text" id="loaderText">Sila Tunggu...</div>
  </div>

  <!-- Weather Widget Premium -->
  <div id="weatherWidget" class="weather-widget">
    <div class="weather-icon" id="w-icon"><i class="fas fa-cloud-sun"></i></div>
    <div class="weather-info">
      <span class="temp" id="w-temp">--°C</span>
      <span class="city" id="w-city">Mencari lokasi...</span>
      <span class="desc" id="w-desc">Memuatkan cuaca...</span>
    </div>
  </div>

  <div class="login-container-premium">
    <h1 class="title-3d">Akses Sistem</h1>
    <p class="subtitle">Log masuk ke Portal Pengurusan Alat Ganti</p>
    <form id="loginForm">
      <div class="form-group">
        <input type="text" id="username" required placeholder="✉️ Username / Email" class="input-3d-glow">
      </div>
      <div class="form-group">
        <input type="password" id="password" required placeholder="🔒 Password" class="input-3d-glow">
      </div>
      <button type="submit" class="button-3d-glow">Log Masuk <i class="fas fa-sign-in-alt"></i></button>
    </form>
    <p class="note">© 2026 Dashboard Alat Ganti Komputer | Sistem Pengurusan Inventori Alat Ganti Komputer</p>
  </div>

  <script src="script.js"></script>

  <!--------login firebase auth-->

  <script type="module">
    // 1️⃣ Import SDK Firebase yang diperlukan
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

    // 2️⃣ Config Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyAYBhrerG2yfHk-xFna0tLI-QbaVDNaV5M",
      authDomain: "sistem-alat-ganti.firebaseapp.com",
      projectId: "sistem-alat-ganti",
      storageBucket: "sistem-alat-ganti.firebasestorage.app",
      messagingSenderId: "974832583504",
      appId: "1:974832583504:web:2001b035fb35093c252255",
      measurementId: "G-44E4RC3EC8"
    };

    // 3️⃣ Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ===== LOGIN =====
    const loginForm = document.getElementById('loginForm');
    const loadingOverlay = document.getElementById('loadingOverlay');

    const loaderText = document.getElementById('loaderText');

    function showLoader(text = "Sila Tunggu...") { 
      if (loadingOverlay) loadingOverlay.style.display = 'flex'; 
      if (loaderText) loaderText.textContent = text;
    }
    function hideLoader() { if (loadingOverlay) loadingOverlay.style.display = 'none'; }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      showLoader("Mengesahkan ID...");

      const email = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const userCred = await signInWithEmailAndPassword(auth, email, password);
        const uid = userCred.user.uid;

        // Ambil role & name dari Firestore
        const snap = await getDoc(doc(db, "users", uid));
        if (!snap.exists()) {
          hideLoader();
          showPremiumToast("❌ Akaun anda tidak didaftarkan. Sila hubungi Admin.", "error");
          return;
        }

        const userData = snap.data();

        // Simpan session
        sessionStorage.setItem("loggedIn", "true");
        sessionStorage.setItem("currentUser", JSON.stringify({
          uid,
          email,
          role: userData.role,
          name: userData.name
        }));

        showLoader("Menyediakan Dashboard...");
        showPremiumToast(`✅ Selamat datang, ${userData.name}`);

        setTimeout(() => {
          window.location.href = "Dashboard/dashboard.html";
        }, 1800);

      } catch (err) {
        console.error("Login error:", err);
        hideLoader();
        showPremiumToast("❌ Email atau password salah. Belum daftar? Sila hubungi Admin.", "error");
      }
    });

    function showPremiumToast(message, type = "success") {
      const toast = document.createElement('div');
      toast.className = 'premium-toast';
      const icon = type === "success" ? "fa-check-circle" : "fa-exclamation-circle";
      const iconColor = type === "success" ? "#10b981" : "#ef4444";
      
      toast.innerHTML = `
        <i class="fas ${icon}" style="color: ${iconColor}"></i>
        <span style="font-weight: 500;">${message}</span>
      `;
      document.body.appendChild(toast);
      
      // Trigger entrance
      setTimeout(() => toast.classList.add('show'), 10);
      
      // Remove after delay
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 500);
      }, 3000);
    }
  </script>



</body>

</html>
